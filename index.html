<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoScript AI Pro | Juan Jose</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0d1117; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-btn { background: linear-gradient(90deg, #ffd700, #ffed4e); color: #000; font-weight: bold; transition: 0.3s; }
        .gold-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        .terminal { font-family: 'Courier New', monospace; background: #000; border: 1px solid #1a202c; color: #00ff00; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="p-4 border-b border-white/10 flex justify-between items-center glass">
        <h1 class="text-xl font-extrabold tracking-tighter">AUTOSCRIPT <span class="text-yellow-400">PRO</span></h1>
        <div class="flex gap-2">
            <button onclick="window.open('https://paypal.me/TU_USUARIO')" class="text-xs glass px-3 py-2 rounded-lg">☕ Donar</button>
            <button class="gold-btn text-xs px-4 py-2 rounded-lg">CUENTA PRO</button>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="max-w-3xl mx-auto text-center space-y-2">
            <h2 class="text-4xl font-black">Crea Contenido Viral</h2>
            <p class="text-gray-400">Desarrollado por Juan Jose Reyes Nuñez</p>
        </div>

        <div class="max-w-3xl mx-auto space-y-4">
            <div class="glass p-1 rounded-2xl">
                <textarea id="ideaInput" placeholder="Describe tu idea aquí..." class="w-full h-32 bg-transparent p-4 focus:outline-none resize-none text-lg"></textarea>
            </div>
            
            <button id="generateBtn" class="w-full gold-btn py-4 rounded-xl text-xl uppercase tracking-widest">
                Iniciar Generación IA
            </button>

            <div class="terminal rounded-xl p-6 min-h-[300px] shadow-2xl relative">
                <div class="flex gap-1.5 mb-4">
                    <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                </div>
                <div id="outputArea" class="whitespace-pre-wrap leading-relaxed">
$ system_status: online
$ user_auth: juan_jose_reyes
$ waiting_for_input...
                </div>
            </div>
        </div>
    </main>

    <footer class="p-4 text-center text-[10px] text-gray-600 border-t border-white/5">
        &copy; 2026 AUTOSCRIPT AI | <a href="#" class="underline">Términos y Privacidad</a>
    </footer>

    <script>
        const HF_TOKEN = "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";
        const API_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3";

        const generateBtn = document.getElementById('generateBtn');
        const ideaInput = document.getElementById('ideaInput');
        const outputArea = document.getElementById('outputArea');

        generateBtn.addEventListener('click', async () => {
            const idea = ideaInput.value.trim();
            if(!idea) return alert("Juan Jose, escribe una idea.");

            generateBtn.disabled = true;
            outputArea.innerHTML = `<span class="animate-pulse text-white">$ PROCESANDO CONEXIÓN SEGURA...</span>`;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `[INST] Eres un experto en marketing. Crea un guion viral de TikTok para: ${idea}. Usa emojis y un gancho fuerte. [/INST]`,
                        parameters: { max_new_tokens: 500, temperature: 0.7 }
                    })
                });

                const data = await response.json();

                if (data.error && data.error.includes("loading")) {
                    outputArea.innerHTML = `<span class="text-yellow-500">$ IA DURMIENDO... REINTENTA EN 15 SEGUNDOS.</span>`;
                } else {
                    const result = data[0].generated_text.split('[/INST]')[1] || data[0].generated_text;
                    outputArea.innerHTML = `<span class="text-white">${result.trim()}</span>\n\n<button onclick="navigator.clipboard.writeText(\`${result.trim().replace(/`/g, "")}\`); alert('¡Copiado!');" class="text-[10px] bg-white/10 px-2 py-1 rounded">COPIAR RESULTADO</button>`;
                }

            } catch (error) {
                outputArea.innerHTML = `<span class="text-red-500">$ ERROR: ${error.message}</span>\n<span class="text-gray-500">Prueba desde un servidor real (Vercel o GitHub Pages).</span>`;
            } finally {
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
